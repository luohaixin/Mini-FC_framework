<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷游戏单元测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #4a90d9;
        }
        #test-output {
            background: #16213e;
            padding: 20px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 20px;
            min-height: 300px;
        }
        .run-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .run-btn:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <h1>🧪 扫雷游戏单元测试</h1>
    <button class="run-btn" onclick="runAllTests()">运行测试</button>
    <div id="test-output">点击"运行测试"按钮开始测试...</div>

    <!-- 加载游戏模块 -->
    <script src="../js/utils.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/minesweeper.js"></script>
    <script src="../js/levelSystem.js"></script>
    
    <!-- 加载测试文件 -->
    <script src="minesweeper.test.js"></script>
    
    <script>
        // 重写 console.log 以在页面显示测试结果
        const output = document.getElementById('test-output');
        const originalLog = console.log;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            output.textContent += args.join(' ') + '\n';
        };
        
        function runAllTests() {
            output.textContent = '';
            runTests();
        }
    </script>
</body>
</html>
