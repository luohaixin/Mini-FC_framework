<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络视频下载工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .input-section {
            padding: 40px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .url-input {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.4);
        }

        .supported-sites {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .site-tag {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .video-info {
            display: none;
            padding: 40px;
        }

        .video-info.active {
            display: block;
        }

        .info-header {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .thumbnail {
            width: 320px;
            height: 180px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .info-details {
            flex: 1;
            min-width: 300px;
        }

        .info-details h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .info-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: #666;
            font-size: 14px;
        }

        .info-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-player {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            background: #000;
        }

        .formats-section {
            margin-top: 30px;
        }

        .formats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .format-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .format-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .format-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .format-quality {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .format-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .format-size {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }

        .format-check {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .format-card.selected .format-check {
            display: flex;
        }

        .download-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .download-options {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filename-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .filename-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .progress-section {
            display: none;
            margin-top: 30px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 14px;
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            display: none;
            background: #efe;
            color: #3c3;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #3c3;
        }

        .success-message.active {
            display: block;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .input-group {
                flex-direction: column;
            }

            .info-header {
                flex-direction: column;
                align-items: center;
            }

            .thumbnail {
                width: 100%;
                max-width: 400px;
            }

            .download-options {
                flex-direction: column;
                width: 100%;
            }

            .filename-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-cloud-download-alt"></i> 网络视频下载工具</h1>
            <p>支持多种视频网站，提供高清下载和在线预览</p>
        </div>

        <div class="main-card">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" class="url-input" id="videoUrl" placeholder="请输入视频链接 (例如: YouTube, Bilibili, 抖音等...)">
                    <button class="btn btn-primary" id="parseBtn" onclick="parseVideo()">
                        <i class="fas fa-search"></i>
                        解析链接
                    </button>
                </div>
                <div class="supported-sites">
                    <span class="site-tag"><i class="fab fa-youtube"></i> YouTube</span>
                    <span class="site-tag"><i class="fas fa-tv"></i> Bilibili</span>
                    <span class="site-tag"><i class="fas fa-music"></i> 抖音</span>
                    <span class="site-tag"><i class="fas fa-video"></i> 快手</span>
                    <span class="site-tag"><i class="fas fa-play-circle"></i> 优酷</span>
                    <span class="site-tag"><i class="fas fa-film"></i> 爱奇艺</span>
                    <span class="site-tag">+100 更多网站</span>
                </div>
            </div>

            <div class="loading" id="loadingSection">
                <div class="spinner"></div>
                <p>正在解析视频信息，请稍候...</p>
            </div>

            <div class="video-info" id="videoInfoSection">
                <div class="info-header">
                    <img class="thumbnail" id="videoThumbnail" src="" alt="视频缩略图">
                    <div class="info-details">
                        <h2 id="videoTitle">视频标题</h2>
                        <div class="info-meta">
                            <span><i class="fas fa-user"></i> <span id="videoUploader">上传者</span></span>
                            <span><i class="fas fa-clock"></i> <span id="videoDuration">时长</span></span>
                            <span><i class="fas fa-link"></i> <a id="videoLink" href="#" target="_blank">查看原链接</a></span>
                        </div>
                    </div>
                </div>

                <div class="preview-section">
                    <h3 class="section-title">
                        <i class="fas fa-play-circle"></i>
                        在线预览
                    </h3>
                    <video class="video-player" id="videoPlayer" controls poster="">
                        <source src="" type="video/mp4">
                        您的浏览器不支持视频播放
                    </video>
                </div>

                <div class="formats-section">
                    <h3 class="section-title">
                        <i class="fas fa-list"></i>
                        选择下载格式
                    </h3>
                    <div class="formats-grid" id="formatsGrid">
                    </div>
                </div>

                <div class="download-section">
                    <h3 class="section-title">
                        <i class="fas fa-download"></i>
                        下载选项
                    </h3>
                    <div class="download-options">
                        <input type="text" class="filename-input" id="filenameInput" placeholder="自定义文件名 (可选)">
                        <button class="btn btn-success" id="downloadBtn" onclick="startDownload()">
                            <i class="fas fa-download"></i>
                            开始下载
                        </button>
                    </div>
                </div>

                <div class="progress-section" id="progressSection">
                    <h3 class="section-title">
                        <i class="fas fa-spinner fa-spin"></i>
                        下载进度
                    </h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
                    </div>
                    <div class="progress-info">
                        <span id="progressStatus">准备下载...</span>
                        <span id="progressSize">0 MB / 0 MB</span>
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
            </div>

            <div class="empty-state" id="emptyState">
                <i class="fas fa-cloud-download-alt"></i>
                <p>输入视频链接并点击"解析链接"开始</p>
            </div>
        </div>
    </div>

    <script>
        let currentVideoData = null;
        let selectedFormat = null;
        let downloadTaskId = null;
        let progressInterval = null;

        function formatDuration(seconds) {
            if (!seconds) return '未知';
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = Math.floor(seconds % 60);
            
            if (hours > 0) {
                return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }

        function formatFileSize(bytes) {
            if (!bytes) return '未知大小';
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + sizes[i];
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            setTimeout(() => {
                errorDiv.classList.remove('active');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('active');
            setTimeout(() => {
                successDiv.classList.remove('active');
            }, 5000);
        }

        async function parseVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                showError('请输入视频链接');
                return;
            }

            const parseBtn = document.getElementById('parseBtn');
            const loadingSection = document.getElementById('loadingSection');
            const videoInfoSection = document.getElementById('videoInfoSection');
            const emptyState = document.getElementById('emptyState');

            parseBtn.disabled = true;
            parseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 解析中...';
            loadingSection.classList.add('active');
            videoInfoSection.classList.remove('active');
            emptyState.style.display = 'none';

            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.success) {
                    currentVideoData = data.data;
                    displayVideoInfo(data.data);
                    loadPreview(url);
                } else {
                    showError(data.error || '解析失败');
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                emptyState.style.display = 'block';
            } finally {
                parseBtn.disabled = false;
                parseBtn.innerHTML = '<i class="fas fa-search"></i> 解析链接';
                loadingSection.classList.remove('active');
            }
        }

        function displayVideoInfo(data) {
            document.getElementById('videoTitle').textContent = data.title;
            document.getElementById('videoUploader').textContent = data.uploader || '未知上传者';
            document.getElementById('videoDuration').textContent = formatDuration(data.duration);
            document.getElementById('videoThumbnail').src = data.thumbnail || '';
            document.getElementById('videoLink').href = data.webpage_url;
            
            const formatsGrid = document.getElementById('formatsGrid');
            formatsGrid.innerHTML = '';
            
            data.formats.forEach((format, index) => {
                const card = document.createElement('div');
                card.className = 'format-card';
                card.onclick = () => selectFormat(format, card);
                
                const quality = format.height ? `${format.height}P` : (format.format_note || '未知');
                const size = format.filesize ? formatFileSize(format.filesize) : '大小未知';
                
                card.innerHTML = `
                    <div class="format-check"><i class="fas fa-check"></i></div>
                    <div class="format-quality">${quality}</div>
                    <div class="format-info">格式: ${format.ext.toUpperCase()}</div>
                    <div class="format-info">编码: ${format.vcodec || '未知'}</div>
                    <div class="format-size">${size}</div>
                `;
                
                formatsGrid.appendChild(card);
                
                if (index === 0) {
                    selectFormat(format, card);
                }
            });

            document.getElementById('videoInfoSection').classList.add('active');
        }

        async function loadPreview(url) {
            try {
                const response = await fetch('/api/preview', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                const videoPlayer = document.getElementById('videoPlayer');

                if (data.success && data.data.preview_url) {
                    videoPlayer.src = data.data.preview_url;
                } else {
                    videoPlayer.style.display = 'none';
                }
            } catch (error) {
                console.error('预览加载失败:', error);
                document.getElementById('videoPlayer').style.display = 'none';
            }
        }

        function selectFormat(format, cardElement) {
            selectedFormat = format;
            
            document.querySelectorAll('.format-card').forEach(c => {
                c.classList.remove('selected');
            });
            cardElement.classList.add('selected');
        }

        async function startDownload() {
            if (!currentVideoData || !selectedFormat) {
                showError('请先选择视频格式');
                return;
            }

            const filename = document.getElementById('filenameInput').value.trim();
            const downloadBtn = document.getElementById('downloadBtn');
            const progressSection = document.getElementById('progressSection');

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 准备中...';
            progressSection.classList.add('active');

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: currentVideoData.webpage_url,
                        format_id: selectedFormat.format_id,
                        filename: filename || `${currentVideoData.title}.${selectedFormat.ext}`
                    })
                });

                const data = await response.json();

                if (data.success) {
                    downloadTaskId = data.task_id;
                    startProgressTracking();
                } else {
                    showError(data.error || '下载启动失败');
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
            }
        }

        function startProgressTracking() {
            const progressBar = document.getElementById('progressBar');
            const progressStatus = document.getElementById('progressStatus');
            const progressSize = document.getElementById('progressSize');
            const downloadBtn = document.getElementById('downloadBtn');

            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/progress/${downloadTaskId}`);
                    const data = await response.json();

                    if (data.success) {
                        const task = data.data;
                        const progress = task.progress || 0;

                        progressBar.style.width = progress + '%';
                        progressBar.textContent = Math.round(progress) + '%';

                        if (task.status === 'downloading') {
                            progressStatus.textContent = '正在下载...';
                            if (task.downloaded && task.total) {
                                progressSize.textContent = `${formatFileSize(task.downloaded)} / ${formatFileSize(task.total)}`;
                            }
                        } else if (task.status === 'completed') {
                            progressStatus.textContent = '下载完成！';
                            clearInterval(progressInterval);
                            downloadBtn.disabled = false;
                            downloadBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
                            showSuccess('视频下载完成！');
                            
                            setTimeout(() => {
                                window.location.href = `/api/file/${downloadTaskId}`;
                            }, 1000);
                        } else if (task.status === 'error') {
                            progressStatus.textContent = '下载失败';
                            clearInterval(progressInterval);
                            downloadBtn.disabled = false;
                            downloadBtn.innerHTML = '<i class="fas fa-download"></i> 开始下载';
                            showError(task.error || '下载失败');
                        }
                    }
                } catch (error) {
                    console.error('获取进度失败:', error);
                }
            }, 1000);
        }

        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                parseVideo();
            }
        });
    </script>
</body>
</html>
