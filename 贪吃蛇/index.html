<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大作战</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇大作战</h1>
        <div class="info-panel">
            <div class="info-item">长度: <span id="length">5</span></div>
            <div class="info-item">得分: <span id="score">0</span></div>
            <div class="info-item">剩余敌人: <span id="enemies">5</span></div>
        </div>
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div class="controls">
            <p>使用方向键 ↑↓←→ 或 WASD 控制移动</p>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <button class="btn" onclick="game.pause()">暂停</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终长度: <span id="finalLength">0</span></p>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="game.restart()">重新开始</button>
    </div>

    <div class="game-win" id="gameWin">
        <h2>🎉 恭喜你获胜!</h2>
        <p>你消灭了所有敌人!</p>
        <p>最终长度: <span id="winLength">0</span></p>
        <p>最终得分: <span id="winScore">0</span></p>
        <button class="btn" onclick="game.restart()">重新开始</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
