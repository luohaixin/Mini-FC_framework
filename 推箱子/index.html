<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推箱子游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🎮 推箱子游戏</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">关卡:</span>
                    <span id="level">1</span>
                </div>
                <div class="info-item">
                    <span class="label">步数:</span>
                    <span id="steps">0</span>
                </div>
                <div class="info-item">
                    <span class="label">分数:</span>
                    <span id="score">0</span>
                </div>
                <div class="info-item">
                    <span class="label">箱子:</span>
                    <span id="boxes">0/0</span>
                </div>
            </div>
        </header>

        <div class="game-area">
            <div id="game-board"></div>
        </div>

        <div class="controls">
            <button id="btn-restart" class="btn">🔄 重新开始</button>
            <button id="btn-undo" class="btn">↩️ 撤销</button>
            <button id="btn-prev" class="btn">⬅️ 上一关</button>
            <button id="btn-next" class="btn">➡️ 下一关</button>
        </div>

        <div class="instructions">
            <h3>🎮 游戏说明</h3>
            <ul>
                <li>使用方向键 ↑↓←→ 或 WASD 控制小人移动</li>
                <li>将箱子推到目标位置（黄色圆圈）</li>
                <li>步数越少，分数越高</li>
                <li>小人不能穿过墙壁和箱子</li>
                <li>一次只能推动一个箱子</li>
            </ul>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">🎉 恭喜通关!</h2>
            <p id="modal-message">你完成了这一关!</p>
            <div class="modal-stats">
                <p>步数: <span id="modal-steps">0</span></p>
                <p>分数: <span id="modal-score">0</span></p>
            </div>
            <div class="modal-buttons">
                <button id="btn-modal-restart" class="btn">重新开始</button>
                <button id="btn-modal-next" class="btn btn-primary">下一关</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
